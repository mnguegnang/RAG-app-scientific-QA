name: Build and Publish Docker Images

# Trigger this pipeline every time I push to the 'master' branch
on:
  push:
    branches:
      - master

# Required permissions for GitHub Actions to push to the Container Registry
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/rag-app-scientific-qa-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/rag-app-scientific-qa-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Download the code onto the GitHub Actions runner
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Log in to the GitHub Container Registry (GHCR) using the automatic GitHub token
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Build and Push the Backend Image (tagged with :latest AND :sha-<commit>)
      - name: Build and push Backend API
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}

      # 4. Build and Push the Frontend Image (tagged with :latest AND :sha-<commit>)
      - name: Build and push Frontend UI
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}