services:
  backend-api:
    build: ./backend
    network_mode: "host"
    environment:
      - OLLAMA_URL=http://localhost:11434/api/generate
      - HF_TOKEN=${HF_TOKEN}
      - HF_HOME=/hf_cache
    volumes:
      - /teamspace/studios/this_studio/.cache/huggingface:/hf_cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s

  frontend-ui:
    # Pull the frozen UI image
    image: ghcr.io/mnguegnang/rag-app-scientific-qa-frontend:latest
    network_mode: "host"
    environment:
      - BACKEND_API_URL=http://localhost:8080/api/chat
    depends_on:
      backend-api:
        condition: service_healthy