services:
  backend-api:
    build: ./backend
    # LINUX SUPERPOWER: Drops the firewall. The container shares the laptop's network.
    network_mode: "host"
    environment:
      # Now, localhost natively works!
      - OLLAMA_URL=http://localhost:11434/api/generate
    volumes:
      # Bind-mount the artifacts directory read-write so that:
      # - On first boot: gdown writes downloaded files into the host directory.
      # - On restart: existing files are detected and the download is skipped.
      - ./backend/app/artifacts:/app/artifacts:rw


  frontend-ui:
    build: ./frontend
    network_mode: "host"
    environment:
      # The frontend can instantly see the backend natively on port 8080
      - BACKEND_API_URL=http://localhost:8080/api/chat
    depends_on:
      - backend-api